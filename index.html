<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Clawdino 3D</title>

	<!-- Custom CSS -->
	<link rel="stylesheet" href="css/style.min.css?patch=3x1">

	<!-- Preload -->
	<link rel="preload" as="image" href="media/repeat.png" />

	<style>
		/* Start screen styles */
		#start-screen {
			position: fixed;
			top: 0; left: 0; width: 100%; height: 100%;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
			z-index: 100;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			font-family: 'Press Start 2P', monospace;
			color: #fff;
			overflow: hidden;
		}
		.game-started #start-screen { display: none; }

		#start-screen h1 {
			font-size: 42px;
			margin: 0 0 5px 0;
			text-shadow: 0 0 20px rgba(232, 123, 53, 0.6), 0 4px 8px rgba(0,0,0,0.5);
			color: #E87B35;
			letter-spacing: 3px;
		}
		#start-screen .subtitle {
			font-size: 16px;
			color: #8a8aaa;
			margin-bottom: 15px;
			font-family: 'Segoe UI', Tahoma, sans-serif;
		}
		#start-screen .subtitle a {
			color: #E87B35;
			text-decoration: underline;
		}
		#start-screen .subtitle a:hover {
			color: #E87B35;
			text-decoration: underline;
		}

		#clawd-canvas-container {
			width: 400px;
			height: 300px;
			position: relative;
		}
		#clawd-canvas-container canvas {
			width: 100% !important;
			height: 100% !important;
			border-radius: 12px;
		}

		#start-screen .loading-info {
			font-size: 10px;
			color: #5f6f8f;
			margin-top: 8px;
		}
		#start-screen .loading-bar {
			width: 200px;
			height: 4px;
			background: #2a2a4e;
			border-radius: 2px;
			margin-top: 8px;
			overflow: hidden;
		}
		#start-screen .loading-bar-fill {
			width: 0%;
			height: 100%;
			background: linear-gradient(90deg, #E87B35, #FA9447);
			border-radius: 2px;
			transition: width 0.3s ease;
		}

		#game-start-btn {
			display: none;
			margin-top: 15px;
			padding: 12px 30px;
			font-family: 'Press Start 2P', monospace;
			font-size: 14px;
			color: #1a1a2e;
			background: linear-gradient(180deg, #FA9447, #E87B35);
			border: none;
			border-radius: 6px;
			cursor: pointer;
			text-shadow: none;
			box-shadow: 0 4px 15px rgba(232, 123, 53, 0.4);
			transition: transform 0.15s, box-shadow 0.15s;
		}
		#game-start-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(232, 123, 53, 0.6);
		}
		#game-start-btn:active {
			transform: translateY(0);
		}

		/* Credit banner - always visible */
		#credit-banner {
			position: fixed;
			bottom: 0; left: 0; width: 100%;
			background: rgba(0, 0, 0, 0.7);
			color: #8a8aaa;
			font-family: 'Segoe UI', Tahoma, sans-serif;
			font-size: 11px;
			text-align: center;
			padding: 4px 0;
			z-index: 9999;
			backdrop-filter: blur(4px);
		}
		#credit-banner a {
			color: #E87B35;
			text-decoration: none;
		}
		#credit-banner a:hover {
			text-decoration: underline;
		}

		/* Fork badge on start screen */
		#start-screen .fork-credit {
			font-family: 'Segoe UI', Tahoma, sans-serif;
			font-size: 12px;
			color: #6a6a8a;
			margin-top: 20px;
			text-align: center;
			line-height: 1.6;
		}
		#start-screen .fork-credit a {
			color: #9a9aba;
			text-decoration: none;
		}
		#start-screen .fork-credit a:hover {
			color: #E87B35;
			text-decoration: underline;
		}
	</style>

</head>
<body>

	<!-- Start Screen with 3D Clawd -->
	<div id="start-screen">
		<h1>Clawdino 3D</h1>
		<div class="subtitle">A clawded mod of the awesome <a href="https://github.com/Priler/dino3d" target="_blank">dino3d</a> by Abraham Tugalov</div>

		<div id="clawd-canvas-container"></div>

		<div class="loading-info">
			<span id="load-status">Loading assets...</span>
			<span id="load-percent">0%</span>
		</div>
		<div class="loading-bar"><div class="loading-bar-fill" id="load-bar-fill"></div></div>

		<button id="game-start-btn">&laquo; Start Game &raquo;</button>

	</div>

	<!-- Hidden legacy elements needed by game JS -->
	<div id="chrome-no-internet" style="display:none;">
		<li id="game-start" class="hidden"></li>
		<div id="game-load-progress" class="bar lime bar-0"></div>
	</div>

	<div id="preloader" class="hidden"></div>

	<div id="game-restart" class="hidden">
		<h1>You're absolutely dead</h1>
		<img src="media/repeat.png">
	</div>

	<!-- Credit Banner (always visible) -->
	<div id="credit-banner">
		Forked from <a href="https://github.com/Priler/dino3d" target="_blank">dino3d</a> by <a href="https://github.com/Priler" target="_blank">Abraham Tugalov</a> &middot; Original game &copy; 2020
	</div>

	<script src="libs/three/three.min.js"></script>
	<script src="libs/three/controls/OrbitControls.js"></script>
	<!-- <script src="libs/three/helpers/CameraHelper.js"></script> -->
	<script src="libs/three/loaders/OBJLoader.js"></script>
	<script src="libs/vox/vox.min.js"></script>

	<!-- Shaders & Postprocessing -->
	<script src="libs/three/postprocessing/EffectComposer.js"></script>
	<script src="libs/three/postprocessing/RenderPass.js"></script>
	<script src="libs/three/postprocessing/ShaderPass.js"></script>
	<script src="libs/three/shaders/CopyShader.js"></script>
	<script src="libs/three/shaders/ConvolutionShader.js"></script>
	<script src="libs/three/postprocessing/SAOPass.js"></script>
	<script src="libs/three/shaders/SAOShader.js"></script>
	<script src="libs/three/shaders/DepthLimitedBlurShader.js"></script>
	<script src="libs/three/shaders/UnpackDepthRGBAShader.js"></script>

	<script src="libs/nebula/three-nebula.js"></script>
	<script src="libs/howler/howler.min.js"></script>

	<!-- 3D Clawd on start screen -->
	<script>
	(function() {
		var container = document.getElementById('clawd-canvas-container');
		var ClawdColors = {
			body:     {r: 0.91, g: 0.48, b: 0.21},
			shellTop: {r: 0.98, g: 0.58, b: 0.28},
			belly:    {r: 0.96, g: 0.65, b: 0.40},
			claw:     {r: 0.80, g: 0.35, b: 0.12},
			leg:      {r: 0.75, g: 0.33, b: 0.09},
			pupil:    {r: 0.05, g: 0.05, b: 0.05},
			mouth:    {r: 0.60, g: 0.25, b: 0.08}
		};
		var CLAWD_SCALE = 1.3 / 96.0;

		function clawdSTLBox(x1, y1, z1, x2, y2, z2, color, dyOff) {
			var s = CLAWD_SCALE, dy = dyOff || 0;
			var cx = ((y1+y2)/2)*s, cy = ((z1+z2)/2+6)*s+dy, cz = ((x1+x2)/2+1.5)*s;
			var w = Math.abs(y2-y1)*s, h = Math.abs(z2-z1)*s, d = Math.abs(x2-x1)*s;
			var geo = new THREE.BoxBufferGeometry(w, h, d);
			geo.translate(cx, cy, cz);
			return {geometry: geo, color: color};
		}

		function clawdLegBox(x1, y1, z1, x2, y2, z2, color, angle) {
			var s = CLAWD_SCALE;
			var w = Math.abs(y2-y1)*s, h = Math.abs(z2-z1)*s, d = Math.abs(x2-x1)*s;
			var geo = new THREE.BoxBufferGeometry(w, h, d);
			geo.translate(0, -h/2, 0);
			if (angle) {
				var mat = new THREE.Matrix4();
				mat.makeRotationZ(-angle);
				geo.applyMatrix(mat);
			}
			var topZ = Math.max(z1, z2);
			geo.translate(((y1+y2)/2)*s, (topZ+6)*s, ((x1+x2)/2+1.5)*s);
			return {geometry: geo, color: color};
		}

		function clawdBuildFrame(frame) {
			var C = ClawdColors, boxes = [];
			var phase = (frame/8)*Math.PI*2;
			var clawBob = Math.sin(phase)*0.02;
			var bodyBob = Math.sin(phase*2)*0.008;
			var legAngleA = (Math.sin(phase)*0.5+0.5)*(Math.PI/2);
			var legAngleB = (Math.sin(phase+Math.PI)*0.5+0.5)*(Math.PI/2);

			boxes.push(clawdSTLBox(-18,-48,18, 9,48,90, C.body, bodyBob));
			boxes.push(clawdSTLBox(5,-32,60, 13,-20,78, C.pupil, bodyBob));
			boxes.push(clawdSTLBox(5, 20,60, 13, 32,78, C.pupil, bodyBob));
			boxes.push(clawdLegBox(-18,-48,-6, -6,-36,18, C.body, legAngleA));
			boxes.push(clawdLegBox(-18, 12,-6, -6, 24,18, C.body, legAngleA));
			boxes.push(clawdLegBox(-6,-24,-6,  6,-12,18, C.body, legAngleB));
			boxes.push(clawdLegBox(-6, 36,-6,  6, 48,18, C.body, legAngleB));
			boxes.push(clawdSTLBox(-18,-72,38, -6,-48,46, C.claw, clawBob));
			boxes.push(clawdSTLBox(-18,-72,46, -6,-48,57, C.claw, clawBob));
			boxes.push(clawdSTLBox(-18, 48,38, -6, 72,46, C.claw, clawBob));
			boxes.push(clawdSTLBox(-18, 48,46, -6, 72,57, C.claw, clawBob));
			return boxes;
		}

		// Scene
		var viewScene = new THREE.Scene();
		viewScene.background = new THREE.Color(0x1a1a2e);
		var viewCamera = new THREE.PerspectiveCamera(50, 400/300, 0.1, 100);
		viewCamera.position.set(0.8, 1.0, 2.2);

		var viewRenderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
		viewRenderer.setSize(400, 300);
		viewRenderer.setPixelRatio(window.devicePixelRatio);
		viewRenderer.setClearColor(0x000000, 0);
		container.appendChild(viewRenderer.domElement);

		var viewControls = new THREE.OrbitControls(viewCamera, viewRenderer.domElement);
		viewControls.target.set(0, 0.5, 0);
		viewControls.enableDamping = true;
		viewControls.autoRotate = true;
		viewControls.autoRotateSpeed = 2.0;
		viewControls.enableZoom = false;

		var ambient = new THREE.AmbientLight(0xffffff, 0.5);
		viewScene.add(ambient);
		var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
		dirLight.position.set(5, 10, 7);
		viewScene.add(dirLight);

		// Build 8 frames
		var viewFrames = [];
		for (var f = 0; f < 8; f++) {
			var boxes = clawdBuildFrame(f);
			var group = new THREE.Group();
			group.visible = (f === 0);
			for (var b = 0; b < boxes.length; b++) {
				var box = boxes[b], c = box.color;
				var mat = new THREE.MeshLambertMaterial({color: new THREE.Color(c.r, c.g, c.b)});
				group.add(new THREE.Mesh(box.geometry, mat));
			}
			viewScene.add(group);
			viewFrames.push(group);
		}

		var viewFrame = 0, viewTimer = 0;
		var viewActive = true;

		function viewAnimate() {
			if (!viewActive) return;
			requestAnimationFrame(viewAnimate);
			viewControls.update();
			viewTimer += 16;
			if (viewTimer > 120) {
				viewTimer = 0;
				viewFrames[viewFrame].visible = false;
				viewFrame = (viewFrame + 1) % 8;
				viewFrames[viewFrame].visible = true;
			}
			viewRenderer.render(viewScene, viewCamera);
		}
		viewAnimate();

		// Expose cleanup for when game starts
		window._stopStartScreenViewer = function() {
			viewActive = false;
			viewRenderer.dispose();
			container.innerHTML = '';
		};
	})();
	</script>

	<script src="libs/visibly/visibly.js"></script>
	<script src="js/config-high.js?patch=3x1"></script>
	<script src="js/build.min.js?patch=clawd9"></script>

	<!-- Wire up new start screen to game -->
	<script>
	(function() {
		var startBtn = document.getElementById('game-start-btn');
		var startScreen = document.getElementById('start-screen');
		var loadStatus = document.getElementById('load-status');
		var loadPercent = document.getElementById('load-percent');
		var loadBarFill = document.getElementById('load-bar-fill');

		// game.init() already ran in build.min.js, but window.onload hasn't fired yet.
		// Intercept load_all to wrap callbacks with our progress UI updates.
		var origLoadAll = load_manager.load_all.bind(load_manager);
		load_manager.load_all = function(callback, assetcallback) {
			origLoadAll(function() {
				// All loaded
				loadStatus.textContent = 'Ready!';
				loadPercent.textContent = '100%';
				loadBarFill.style.width = '100%';
				startBtn.style.display = 'block';
				callback();
			}, function() {
				// Per-asset progress
				var p = load_manager.getLoadPercentage();
				loadPercent.textContent = p + '%';
				loadBarFill.style.width = p + '%';
				if (assetcallback) assetcallback();
			});
		};

		// Override btnStartClick to use new start screen
		var origBtnStart = InterfaceManager.prototype.btnStartClick;
		InterfaceManager.prototype.btnStartClick = function(e) {
			startScreen.style.display = 'none';
			if (window._stopStartScreenViewer) window._stopStartScreenViewer();
			document.body.classList.add('game-started');
			game.start();
		};

		// Start button click handler
		startBtn.addEventListener('click', function() {
			game.interface.btnStartClick();
		});
	})();
	</script>

</body>
</html>
