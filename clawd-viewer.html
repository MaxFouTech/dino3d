<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clawd Viewer</title>
  <style>
    body { margin: 0; background: #1a1a2e; overflow: hidden; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #ccc;
      font-family: monospace; font-size: 14px; z-index: 1;
    }
    #frame-label {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: #ccc; font-family: monospace; font-size: 16px; z-index: 1;
    }
    #block-info {
      position: absolute; top: 10px; right: 10px; color: #0f0;
      font-family: monospace; font-size: 13px; z-index: 1;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
      max-width: 400px; white-space: pre-wrap; display: none;
    }
    #clawd-ref {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
    }
    #clawd-ref:active { cursor: grabbing; }
    #clawd-ref img {
      width: 480px;
      image-rendering: pixelated;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    #clawd-ref:hover img { opacity: 1; }
  </style>
</head>
<body>
  <div id="info">
    Drag to rotate &middot; Scroll to zoom<br>
    Left/Right arrows: cycle frames &middot; Space: toggle auto-play<br>
    Click a block to see its reference<br>
    T: toggle ASCII ref transparency
  </div>
  <div id="frame-label">Frame 0 / 7</div>
  <div id="block-info"></div>
  <div id="clawd-ref"><img src="media/clawd-ascii.png" alt="Clawd ASCII" draggable="false"></div>

  <script src="libs/three/three.min.js"></script>
  <script src="libs/three/controls/OrbitControls.js"></script>
  <script>
    // === Clawd model code (self-contained) ===
    var ClawdColors = {
      body:     {r: 0.91, g: 0.48, b: 0.21},
      shellTop: {r: 0.98, g: 0.58, b: 0.28},
      belly:    {r: 0.96, g: 0.65, b: 0.40},
      claw:     {r: 0.80, g: 0.35, b: 0.12},
      leg:      {r: 0.75, g: 0.33, b: 0.09},
      eyeWhite: {r: 1.0,  g: 1.0,  b: 1.0},
      pupil:    {r: 0.05, g: 0.05, b: 0.05},
      mouth:    {r: 0.60, g: 0.25, b: 0.08}
    };

    var CLAWD_SCALE = 1.3 / 96.0;

    function colorName(c) {
      for (var k in ClawdColors) {
        var cc = ClawdColors[k];
        if (cc.r === c.r && cc.g === c.g && cc.b === c.b) return 'C.' + k;
      }
      return JSON.stringify(c);
    }

    function clawdCreateBox(cx, cy, cz, w, h, d, color) {
      var geo = new THREE.BoxBufferGeometry(w, h, d);
      geo.translate(cx, cy, cz);
      return {geometry: geo, color: color};
    }

    function clawdSTLBox(x1, y1, z1, x2, y2, z2, color, dyOff) {
      var s = CLAWD_SCALE;
      var dy = dyOff || 0;
      var cx = ((y1 + y2) / 2) * s;
      var cy = ((z1 + z2) / 2 + 6) * s + dy;
      var cz = ((x1 + x2) / 2 + 1.5) * s;
      var w = Math.abs(y2 - y1) * s;
      var h = Math.abs(z2 - z1) * s;
      var d = Math.abs(x2 - x1) * s;
      return clawdCreateBox(cx, cy, cz, w, h, d, color);
    }

    function clawdLegBox(x1, y1, z1, x2, y2, z2, color, angle) {
      var s = CLAWD_SCALE;
      var w = Math.abs(y2 - y1) * s;
      var h = Math.abs(z2 - z1) * s;
      var d = Math.abs(x2 - x1) * s;
      var hExtra = h * 0.45;
      var geo = new THREE.BoxBufferGeometry(w, h + hExtra, d);
      geo.translate(0, -(h + hExtra) / 2 + hExtra, 0);
      if (angle) {
        var mat = new THREE.Matrix4();
        mat.makeRotationZ(-angle);
        geo.applyMatrix(mat);
      }
      var topZ = Math.max(z1, z2);
      geo.translate(((y1 + y2) / 2) * s, (topZ + 6) * s + 0.04, ((x1 + x2) / 2 + 1.5) * s);
      return {geometry: geo, color: color};
    }

    function clawdBuildRunFrame(frame) {
      var C = ClawdColors;
      var boxes = [];
      var labels = [];
      var phase = (frame / 8) * Math.PI * 2;
      var clawBob = Math.sin(phase) * 0.02;
      var bodyBob = Math.sin(phase * 2) * 0.008;
      var legAngleA = (Math.sin(phase) * 0.5 + 0.5) * (75 * Math.PI / 180);
      var legAngleB = (Math.sin(phase + Math.PI) * 0.5 + 0.5) * (75 * Math.PI / 180);

      // Body
      boxes.push(clawdSTLBox(-18, -48, 18,  9, 48, 90, C.body, bodyBob));
      labels.push('clawdSTLBox(-18, -48, 18, 9, 48, 90, C.body, bodyBob)\n[Main body/carapace]');

      boxes.push(clawdSTLBox(5, -31, 55, 13, -24, 73, C.pupil, bodyBob));
      labels.push('clawdSTLBox(5, -31, 55, 13, -24, 73, C.pupil, bodyBob)\n[Left eye (black)]');

      boxes.push(clawdSTLBox(5,  24, 55, 13,  31, 73, C.pupil, bodyBob));
      labels.push('clawdSTLBox(5, 24, 55, 13, 31, 73, C.pupil, bodyBob)\n[Right eye (black)]');

      // Legs
      boxes.push(clawdLegBox(-18, -46, -3, -6, -37, 18, C.body, legAngleA));
      labels.push('clawdLegBox(-18, -46, -3, -6, -37, 18, C.body, legAngleA)\n[Front-left leg]');

      boxes.push(clawdLegBox(-18,  14, -3, -6,  23, 18, C.body, legAngleA));
      labels.push('clawdLegBox(-18, 14, -3, -6, 23, 18, C.body, legAngleA)\n[Front-right leg]');

      boxes.push(clawdLegBox( -6, -22, -3,  6, -13, 18, C.body, legAngleB));
      labels.push('clawdLegBox(-6, -22, -3, 6, -13, 18, C.body, legAngleB)\n[Inner-left leg]');

      boxes.push(clawdLegBox( -6,  31, -3,  6,  40, 18, C.body, legAngleB));
      labels.push('clawdLegBox(-6, 31, -3, 6, 40, 18, C.body, legAngleB)\n[Inner-right leg]');

      // Claws
      boxes.push(clawdSTLBox(-11, -65, 38, 1, -48, 46, C.claw, clawBob));
      labels.push('clawdSTLBox(-11, -65, 38, 1, -48, 46, C.claw, clawBob)\n[Left claw bottom]');

      boxes.push(clawdSTLBox(-11, -65, 46, 1, -48, 55, C.claw, clawBob));
      labels.push('clawdSTLBox(-11, -65, 46, 1, -48, 55, C.claw, clawBob)\n[Left claw top]');

      boxes.push(clawdSTLBox(-11,  48, 38, 1,  65, 46, C.claw, clawBob));
      labels.push('clawdSTLBox(-11, 48, 38, 1, 65, 46, C.claw, clawBob)\n[Right claw bottom]');

      boxes.push(clawdSTLBox(-11,  48, 46, 1,  65, 55, C.claw, clawBob));
      labels.push('clawdSTLBox(-11, 48, 46, 1, 65, 55, C.claw, clawBob)\n[Right claw top]');

      return { boxes: boxes, labels: labels };
    }

    // === Scene setup ===
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 3);

    var renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.enableDamping = true;

    // Lights
    var ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // Grid + Axes
    scene.add(new THREE.GridHelper(4, 20, 0x444466, 0x333355));
    scene.add(new THREE.AxesHelper(1));

    // Build all 8 frames as individual meshes per block
    var frameGroups = [];   // array of { group, meshes, labels }
    for (var f = 0; f <= 7; f++) {
      var data = clawdBuildRunFrame(f);
      var group = new THREE.Group();
      group.visible = (f === 0);
      var meshes = [];
      for (var b = 0; b < data.boxes.length; b++) {
        var box = data.boxes[b];
        var c = box.color;
        var mat = new THREE.MeshLambertMaterial({
          color: new THREE.Color(c.r, c.g, c.b)
        });
        var m = new THREE.Mesh(box.geometry, mat);
        m._blockIndex = b;
        group.add(m);
        meshes.push(m);
      }
      scene.add(group);
      frameGroups.push({ group: group, meshes: meshes, labels: data.labels });
    }

    var currentFrame = 0;
    var autoPlay = false;
    var autoTimer = 0;
    var label = document.getElementById('frame-label');
    var blockInfo = document.getElementById('block-info');
    var highlightedMesh = null;
    var originalColor = null;

    function showFrame(idx) {
      clearHighlight();
      frameGroups[currentFrame].group.visible = false;
      currentFrame = ((idx % 8) + 8) % 8;
      frameGroups[currentFrame].group.visible = true;
      label.textContent = 'Frame ' + currentFrame + ' / 7' + (autoPlay ? '  [AUTO]' : '');
    }

    function clearHighlight() {
      if (highlightedMesh && originalColor) {
        highlightedMesh.material.color.copy(originalColor);
        highlightedMesh.material.emissive.setHex(0x000000);
        highlightedMesh = null;
        originalColor = null;
      }
      blockInfo.style.display = 'none';
    }

    // Raycaster for click detection
    var raycaster = new THREE.Raycaster();
    var mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', function(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      var fg = frameGroups[currentFrame];
      var intersects = raycaster.intersectObjects(fg.meshes);

      clearHighlight();

      if (intersects.length > 0) {
        var hit = intersects[0].object;
        var idx = hit._blockIndex;

        // Highlight
        originalColor = hit.material.color.clone();
        hit.material.emissive.setHex(0x333333);
        highlightedMesh = hit;

        // Show info
        blockInfo.textContent = 'Block #' + idx + '\n' + fg.labels[idx];
        blockInfo.style.display = 'block';
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.code === 'ArrowRight') showFrame(currentFrame + 1);
      else if (e.code === 'ArrowLeft') showFrame(currentFrame - 1);
      else if (e.code === 'Space') { autoPlay = !autoPlay; showFrame(currentFrame); e.preventDefault(); }
    });

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate(time) {
      requestAnimationFrame(animate);
      controls.update();
      if (autoPlay) {
        autoTimer += 16;
        if (autoTimer > 120) { autoTimer = 0; showFrame(currentFrame + 1); }
      }
      renderer.render(scene, camera);
    }
    animate();

    // Toggle ASCII ref transparency with T key
    (function() {
      var refImg = document.querySelector('#clawd-ref img');
      var transparent = false;
      document.addEventListener('keydown', function(e) {
        if (e.code === 'KeyT') {
          transparent = !transparent;
          refImg.style.opacity = transparent ? 0.3 : 0.85;
          refImg.style.filter = transparent ? 'drop-shadow(0 0 3px #0f0)' : 'none';
        }
      });
    })();

    // Draggable Clawd reference image
    (function() {
      var ref = document.getElementById('clawd-ref');
      var dragging = false, offsetX, offsetY;

      ref.addEventListener('mousedown', function(e) {
        dragging = true;
        offsetX = e.clientX - ref.offsetLeft;
        offsetY = e.clientY - ref.offsetTop;
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        ref.style.left = (e.clientX - offsetX) + 'px';
        ref.style.top = (e.clientY - offsetY) + 'px';
        ref.style.right = 'auto';
        ref.style.bottom = 'auto';
      });

      document.addEventListener('mouseup', function() {
        dragging = false;
      });
    })();
  </script>
</body>
</html>
